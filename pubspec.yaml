name: grocery_store
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  stacked: ^3.4.0
  stacked_services: ^1.1.0
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  dartz: ^0.10.1
  toastification: ^3.0.2
  intl_utils: ^2.8.8
  intl: ^0.19.0
  path: ^1.9.1
  cached_network_image: ^3.4.1
  json_annotation: ^4.9.0
  shimmer: ^3.0.0

  stacked_shared: any
  velocity_x: ^4.3.1
  flutter_hooks: ^0.21.3+1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
dev_dependencies:
  build_runner: ^2.4.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.1
  stacked_generator: ^1.3.3
  golden_toolkit: ^0.15.0
  flutter_gen_runner: ^5.13.0+1
  retrofit_generator: ^10.2.3
  json_serializable: ^6.8.0

dependency_overrides:
  intl: ^0.19.0
  flutter_hooks: ^0.21.2
  flutter_image_compress: ^2.4.0
  analyzer: 8.1.1
  dart_style: 3.0.0

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/img/

